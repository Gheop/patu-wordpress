name: patu-wp
services:
  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wp
      MARIADB_PASSWORD: wp
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - db:/var/lib/mysql
  wordpress:
    image: wordpress:6-php8.3-apache
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8888:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: "1"
    volumes:
      - wp:/var/www/html
      - ./:/var/www/html/wp-content/plugins/patu:z
  cli:
    image: wordpress:cli-php8.3
    user: "33:33"
    command: ["tail","-f","/dev/null"]
    depends_on:
      - wordpress
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wp:/var/www/html
      - ./:/var/www/html/wp-content/plugins/patu:z
volumes:
  db:
  wp:
